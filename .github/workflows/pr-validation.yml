name: PR Validation

on:
  pull_request:
    branches: [ master, develop ]
  push:
    branches: [ master, develop ]

jobs:
  # ============================================================
  # JOB 1: Code quality, tests, and bundle — all branches
  # ============================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 TypeScript type check
        run: npx tsc --noEmit

      - name: 🎨 Run ESLint
        run: npx nx run-many --target=lint --all --parallel=3

      - name: 🧪 Run tests
        run: npx nx run-many --target=test --all --parallel=3 --coverage

      - name: 📊 Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/junit.xml'
          reporter: jest-junit
          fail-on-error: false

      - name: 📤 Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: '**/coverage/lcov.info'
          flags: unittests

      - name: 📦 Expo web bundle validation
        run: |
          cd apps/mobile
          npx expo export --platform web --output-dir /tmp/expo-bundle
          echo "✅ Bundle size: $(du -sh /tmp/expo-bundle | cut -f1)"

      - name: 🔗 Check API endpoint compliance
        run: |
          BASE=${GITHUB_BASE_REF:-HEAD~1}
          MODIFIED_API=$(git diff --name-only origin/$BASE...HEAD 2>/dev/null | grep -E "(api|client|service)\.(ts|tsx)$" | grep -v "\.spec\." || true)
          if [ -n "$MODIFIED_API" ]; then
            echo "⚠️ Modified API files — reviewers verify against API_REGISTRY.md:"
            echo "$MODIFIED_API"
          else
            echo "✅ No API client changes"
          fi

      - name: 🔍 Check for debugger statements
        run: |
          BASE=${GITHUB_BASE_REF:-HEAD~1}
          if git diff --name-only origin/$BASE...HEAD 2>/dev/null | grep -E "\.(ts|tsx|js|jsx)$" | xargs grep -n "debugger" 2>/dev/null; then
            echo "❌ Found debugger statements — remove before merging"
            exit 1
          fi
          echo "✅ No debugger statements"

      - name: 🔍 Check for console.log
        run: |
          BASE=${GITHUB_BASE_REF:-HEAD~1}
          if git diff --name-only origin/$BASE...HEAD 2>/dev/null | grep -E "\.(ts|tsx|js|jsx)$" | xargs grep -n "console\.log" 2>/dev/null; then
            echo "⚠️ WARNING: Found console.log — consider removing"
          else
            echo "✅ No console.log"
          fi

      - name: 🔐 Check package-lock.json sync
        run: |
          BASE=${GITHUB_BASE_REF:-HEAD~1}
          if git diff --name-only origin/$BASE...HEAD 2>/dev/null | grep -q "package.json"; then
            if git diff --name-only origin/$BASE...HEAD 2>/dev/null | grep -q "package-lock.json"; then
              echo "✅ Lock file updated"
            else
              echo "❌ package.json changed but package-lock.json not updated — run 'npm install'"
              exit 1
            fi
          else
            echo "✅ No package.json changes"
          fi

      - name: 🔒 Security audit
        run: npm audit --audit-level=high || echo "⚠️ Security vulnerabilities found — review before merging"

      - name: ✅ Validation complete
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All validations passed!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ============================================================
  # JOB 2: EAS Build — only on master push or PR to master
  # ============================================================
  eas-build:
    name: EAS Build (preview APK)
    runs-on: ubuntu-latest
    needs: validate
    if: |
      github.ref == 'refs/heads/master' ||
      (github.event_name == 'pull_request' && github.base_ref == 'master')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔧 Setup EAS CLI
        run: npm install -g eas-cli

      - name: 📱 EAS Build (Android preview APK)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --no-wait
          echo "✅ EAS build queued — check https://expo.dev/accounts/nillodbm/projects/connecthealth"
